<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P. Lokesh | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23141414'/><text x='50%' y='68%' font-family='system-ui, sans-serif' font-weight='bold' font-size='55' fill='%23E8332A' text-anchor='middle'>L</text></svg>" />
    <script>
      (function() {
        try {
          var cachedFavicon = localStorage.getItem('lokesh_portfolio_favicon_url');
          if (cachedFavicon && cachedFavicon.trim() !== '') {
            var link = document.querySelector("link[rel~='icon']");
            if (!link) {
              link = document.createElement('link');
              link.rel = 'icon';
              document.head.appendChild(link);
            }
            link.href = cachedFavicon;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
