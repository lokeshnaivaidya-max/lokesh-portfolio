<!doctype html>
<html lang="en" style="background-color: #050505; color: #F8FAFC;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P. Lokesh | Portfolio</title>
    <!-- Default Favicon fallback -->
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23141414'/><text x='50%' y='68%' font-family='system-ui, sans-serif' font-weight='bold' font-size='55' fill='%23C5A880' text-anchor='middle'>L</text></svg>" />
    <script>
      (function() {
        try {
          // Synchronously inject cached favicon before HTML parser proceeds
          var cachedFavicon = localStorage.getItem('lokesh_portfolio_favicon_url');
          if (cachedFavicon && cachedFavicon.trim() !== '') {
            var link = document.getElementById('app-favicon') || document.querySelector("link[rel~='icon']");
            if (link) {
              link.href = cachedFavicon;
            }
          }
          // Immediately trigger browser preload for cached avatar & logo
          var cachedAvatar = localStorage.getItem('lokesh_portfolio_avatar_url');
          if (cachedAvatar && cachedAvatar.trim() !== '') {
            var imgPreload = document.createElement('link');
            imgPreload.rel = 'preload';
            imgPreload.as = 'image';
            imgPreload.href = cachedAvatar;
            document.head.appendChild(imgPreload);
          }
          var cachedLogo = localStorage.getItem('lokesh_portfolio_logo_url');
          if (cachedLogo && cachedLogo.trim() !== '') {
            var logoPreload = document.createElement('link');
            logoPreload.rel = 'preload';
            logoPreload.as = 'image';
            logoPreload.href = cachedLogo;
            document.head.appendChild(logoPreload);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="background-color: #050505; color: #F8FAFC;" class="bg-[#050505] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
